<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Leaflet Overlay LaWA - Unit Tests</title>
  <!-- Mocha & Chai CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mocha/10.2.0/mocha.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mocha/10.2.0/mocha.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chai/4.3.7/chai.min.js"></script>
</head>
<body>
  <!-- テスト結果の出力先 -->
  <div id="mocha"></div>

  <script>
    // Mochaのセットアップ
    mocha.setup('bdd');
    const expect = chai.expect;
  </script>

  <!-- テスト対象のJavaScriptコードをモック前提でテストできるように、必要な定義を準備 -->
  <!-- ※グローバル衝突を避けるためのダミーの親オブジェクト定義 -->
  <script>
    window.svgMap = {
      transform: (lng, lat) => ({ x: lng * 100, y: lat * 100 }),
      refreshScreen: () => {}
    };
    window.svgImageProps = {
      scale: 1.0,
      CRS: 'EPSG:4326'
    };
    window.svgMapGIStool = {
      drawGeoJson: () => {}
    };
  </script>

  <!-- テスト対象のコードをモジュールとして読み込み可能にするため、
       またはグローバル変数から関数を取り出すためにローカルにモックした上でテストします。 -->
  <script src="../leafletOverlay.js"></script>
  
  <!-- 単体テスト仕様書 -->
  <script src="unit.spec.js"></script>

  <script>
    // テスト実行
    mocha.run();
  </script>
</body>
</html>
